name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/**'
  workflow_dispatch:

env:
  DEPLOY_PATH: /var/www/metric-tracking

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: |
            server/dist
            server/package.json
            server/pnpm-lock.yaml
            server/ecosystem.config.cjs

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: server-build

      - name: Prepare deploy directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: mkdir -p ${{ env.DEPLOY_PATH }}

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: 'dist,package.json,pnpm-lock.yaml,ecosystem.config.cjs'
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 0
          overwrite: true

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: ENV_FILE,DEPLOY_PATH
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            echo "$ENV_FILE" > .env

            npm install -g pnpm@9
            pnpm install --prod --frozen-lockfile

            if pm2 describe metric-tracking > /dev/null 2>&1; then
              pm2 restart metric-tracking
            else
              pm2 start ecosystem.config.cjs
            fi

            pm2 save
            pm2 startup || true
